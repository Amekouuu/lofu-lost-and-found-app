<nav class="navbar">
  <div class="nav-inner">

    <!-- Logo -->
    <a routerLink="/" class="nav-logo">
      <svg class="nav-logo-icon" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="15" stroke="#1a3fad" stroke-width="2"/>
        <circle cx="16" cy="16" r="6" fill="#1a3fad"/>
        <path d="M16 4v4M16 24v4M4 16h4M24 16h4" stroke="#1a3fad" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="nav-logo-text">LoFu</span>
    </a>

    <!-- Desktop Links -->
    <div class="nav-links">
      <a routerLink="/"            routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="nav-link">Home</a>
      <a routerLink="/lost-items"  routerLinkActive="active" class="nav-link">Lost Items</a>
      <a routerLink="/create"      routerLinkActive="active" class="nav-link">Post an Item</a>
      <a routerLink="/about"       routerLinkActive="active" class="nav-link">About Us</a>
      <a routerLink="/contact"     routerLinkActive="active" class="nav-link">Contact Us</a>
    </div>

    <!-- Desktop Actions -->
    <div class="nav-actions">
      <ng-container *ngIf="authService.currentUser$ | async as user; else guestTpl">
        <a [routerLink]="['/profile', user._id]" class="nav-avatar" [title]="user.username">
          <img *ngIf="user.avatarUrl" [src]="user.avatarUrl" [alt]="user.username" />
          <span *ngIf="!user.avatarUrl">{{ user.username[0].toUpperCase() }}</span>
        </a>
        <button class="btn btn-ghost btn-sm" (click)="logout()">Log out</button>
      </ng-container>
      <ng-template #guestTpl>
        <a routerLink="/login"    class="btn btn-ghost btn-sm">Log in</a>
        <a routerLink="/register" class="btn btn-primary btn-sm">Sign Up</a>
      </ng-template>
    </div>

    <!-- Hamburger -->
    <button class="hamburger" (click)="open = !open" aria-label="Toggle menu">
      <span [class.rot1]="open"></span>
      <span [class.hide]="open"></span>
      <span [class.rot2]="open"></span>
    </button>

  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="open">
    <a routerLink="/"           (click)="open=false" class="mob-link">Home</a>
    <a routerLink="/lost-items" (click)="open=false" class="mob-link">Lost Items</a>
    <a routerLink="/create"     (click)="open=false" class="mob-link">Post an Item</a>
    <a routerLink="/about"      (click)="open=false" class="mob-link">About Us</a>
    <a routerLink="/contact"    (click)="open=false" class="mob-link">Contact Us</a>
    <div class="mob-divider"></div>
    <ng-container *ngIf="authService.currentUser$ | async as user; else mobGuest">
      <a [routerLink]="['/profile', user._id]" (click)="open=false" class="mob-link">My Profile</a>
      <button (click)="logout()" class="mob-link mob-danger">Log out</button>
    </ng-container>
    <ng-template #mobGuest>
      <a routerLink="/login"    (click)="open=false" class="mob-link">Log in</a>
      <a routerLink="/register" (click)="open=false" class="mob-link mob-primary">Sign Up</a>
    </ng-template>
  </div>
</nav>
