<div class="auth-page">

  <!-- Left: Form -->
  <div class="auth-form-side">

    <!-- Logo -->
    <a routerLink="/" class="auth-logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="15" stroke="#1a3fad" stroke-width="2"/>
        <circle cx="16" cy="16" r="6" fill="#1a3fad"/>
        <path d="M16 4v4M16 24v4M4 16h4M24 16h4" stroke="#1a3fad" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="auth-logo-text">LoFu</span>
    </a>

    <div class="auth-form-wrap">
      <h1 class="auth-title">Login</h1>
      <p class="auth-subtitle">Login to access your LoFu account.</p>

      <!-- Error -->
      <div class="auth-error" *ngIf="error">{{ error }}</div>

      <!-- Form -->
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

        <div class="form-group">
          <label class="form-label">Email</label>
          <input
            class="form-control"
            type="email"
            placeholder="johndoe@gmail.com"
            [(ngModel)]="email"
            name="email"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <input
              class="form-control"
              [type]="showPass ? 'text' : 'password'"
              placeholder="••••••••••••"
              [(ngModel)]="password"
              name="password"
              required
            />
            <button type="button" class="eye-btn" (click)="showPass = !showPass">
              {{ showPass ? '🙈' : '👁' }}
            </button>
          </div>
        </div>

        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" [(ngModel)]="remember" name="remember" />
            <span>Remember me</span>
          </label>
          <a routerLink="/forgot-password" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" [disabled]="loading">
          <span *ngIf="!loading">Login</span>
          <span *ngIf="loading" class="btn-spinner"></span>
        </button>

        <p class="auth-switch">
          Don't have an account? <a routerLink="/register">Sign up</a>
        </p>

      </form>
    </div>
  </div>

  <!-- Right: Illustration placeholder -->
  <div class="auth-image-side">
    <div class="auth-illustration">
      <!-- REPLACE: swap the div below with an <img src="assets/login-illustration.png" /> -->
      <div class="illustration-placeholder">
        <span class="illustration-icon">🧍🧍‍♀️</span>
        <p>Replace with login illustration<br><code>assets/login-illustration.png</code></p>
      </div>
    </div>
  </div>

</div>
